name: CI

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set-up Node
        uses: actions/setup-node@v1
        with:
          node-version: 20.x
      - name: Install Dependencies
        run: npm install
      - name: Lint
        run: node_modules/eslint/bin/eslint.js -c eslint.config.js src/romanConstants.js src/romanUtils.js src/romanConverter.js src/app.js

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - run: echo "🎉 Job triggered by ${{ github.event_name }} event."
      - run: echo "🖥 Running on ${{ runner.os }} server hosted by GitHub!"
      - uses: actions/checkout@v3
      - name: Set-up Node
        uses: actions/setup-node@v1
        with:
          node-version: 20.x
      - name: Install Dependencies
        run: npm install
      - name: Test
        run: node_modules/.bin/mocha-headless-chrome -f src/test.html --args no-sandbox
      - run: echo "🍏 Job status is ${{ job.status }}."

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - run: mkdir dist
      - run: cp src/index.html dist/
      - run: cp src/romanConstants.js dist/
      - run: cp src/romanUtils.js dist/
      - run: cp src/romanConverter.js dist/
      - run: cp src/app.js dist/
      - run: cp src/styles.css dist/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v2
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
